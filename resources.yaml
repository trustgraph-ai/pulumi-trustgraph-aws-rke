      "required": true, "type": "string"}, "llm-temperature": {"default": 0.3, "description":
      "LLM temperature", "helper": "A floating point number between 0 and 1", "max":
      10, "min": 0, "placeholder": 0.3, "required": true, "type": "float"}}, "prompt":
      {"system": "You are a helpful assistant.", "template-index": ["agent-kg-extract",
      "agent-react", "diagnose-csv", "diagnose-json", "diagnose-structured-data",
      "diagnose-xml", "document-prompt", "extract-concepts", "extract-definitions",
